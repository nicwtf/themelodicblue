<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Melodic Blue</title>
    <meta property="og:title" content="The Melodic Blue (2020)">
    <meta property="og:description" content="a fan project">
    <meta property="og:image" content="https://i.imgur.com/5HRpgzy.png">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#525d72">
    <meta name="twitter:card" content="summary_large_image">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-transform: lowercase;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        * { border-radius: 0 !important; transition: none !important; }
        .wrapper { 
            width: 100%; 
            max-width: 800px; 
            padding: 20px; 
            margin: auto; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
        .left-col, .right-col { display: flex; flex-direction: column; }
        .title, .status { font-size: 40px; font-weight: 700; letter-spacing: -0.04em; line-height: 1; margin: 0 0 20px 0; text-align: left; }
        .image-container { width: 100%; position: relative; }
        .cover-image { display: block; width: 100%; aspect-ratio: 1 / 1; object-fit: cover; background-color: #f0f0f0; }
        .nav { display: flex; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .nav-link, .toggle-btn { color: #000; text-decoration: underline; font-weight: 700; font-size: 13px; cursor: pointer; background: none; border: none; padding: 0; }
        .tracklist { font-weight: 500; font-size: 13px; display: flex; flex-direction: column; justify-content: space-between; line-height: 1; }
        .track-row { display: flex; white-space: nowrap; cursor: default; align-items: center; }
        .track-name { opacity: 0.4; }
        .track-row.released .track-name { opacity: 1; cursor: pointer; }
        .num { width: 25px; flex-shrink: 0; pointer-events: none; opacity: 1; color: #000; }
        .player-section { margin-top: 20px; opacity: 0; pointer-events: none; background: #fff; }
        .player-section.visible { opacity: 1; pointer-events: auto; }
        .slider-container { position: relative; width: 100%; height: 20px; display: flex; align-items: center; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 2px; background: #e0e0e0; outline: none; margin: 0; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #000; border-radius: 50% !important; cursor: pointer; position: relative; z-index: 2; }
        .slider-fill { position: absolute; height: 2px; background: #000; left: 0; pointer-events: none; z-index: 1; }
        .controls-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .play-btn, .icon-btn { cursor: pointer; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: #000; }
        .volume-group { display: flex; align-items: center; gap: 8px; width: 110px; }
        .mute-btn { cursor: pointer; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 640px) {
            body { overflow-y: auto; height: auto; display: block; }
            .grid-container { grid-template-columns: 1fr; gap: 30px; }
            .tracklist { height: auto !important; gap: 12px; }
            .title, .status { font-size: 32px; }
            .wrapper { max-width: 90%; margin: 40px auto; }
            .player-section.visible { position: sticky; bottom: 0px; padding: 15px 0 25px 0; border-top: 1px solid #eee; z-index: 50; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="grid-container">
            <div class="left-col">
                <h1 class="title">the <span style="color:#525d72">m</span><span style="color:#856a78">e</span><span style="color:#83704f">l</span><span style="color:#834d48">o</span><span style="color:#726766">d</span><span style="color:#6d5a6b">i</span><span style="color:#75544c">c</span> blue</h1>
                <div class="image-container">
                    <img src="cover.png" id="cover-img" class="cover-image">
                </div>
                <div class="nav">
                    <a href="mailto:contact.nicwtf@gmail.com" class="nav-link">contact</a>
                    <a href="https://discord.gg/7rsBCMdhxF" class="nav-link">stay posted</a>
                    <button id="quality-toggle" class="toggle-btn">audio type: mp3</button>
                </div>
            </div>
            <div class="right-col">
                <div class="status">tracklist</div>
                <div class="tracklist" id="list-box">
                    <div class="track-row"><span class="num">01</span><span class="track-name">llc the dead / torch</span></div>
                    <div class="track-row released" data-audio="durag_activity" data-cover="covers/durag_activity.png" data-active-color="#684b39"><span class="num">02</span><span class="track-name">durag activity</span></div>
                    <div class="track-row"><span class="num">03</span><span class="track-name">diego</span></div>
                    <div class="track-row"><span class="num">04</span><span class="track-name">patience interlude</span></div>
                    <div class="track-row"><span class="num">05</span><span class="track-name">south africa</span></div>
                    <div class="track-row released" data-audio="gwfm" data-cover="covers/gwfm.png" data-active-color="#3c612c"><span class="num">06</span><span class="track-name">gwfm</span></div>
                    <div class="track-row"><span class="num">07</span><span class="track-name">hooligan</span></div>
                    <div class="track-row"><span class="num">08</span><span class="track-name">first order of business</span></div>
                    <div class="track-row released" data-audio="monogamy" data-cover="covers/monogamy.png" data-active-color="#213574"><span class="num">09</span><span class="track-name">monogamy</span></div>
                    <div class="track-row"><span class="num">10</span><span class="track-name">no sense</span></div>
                    <div class="track-row"><span class="num">11</span><span class="track-name">rick rubin</span></div>
                    <div class="track-row"><span class="num">12</span><span class="track-name">honey im blue</span></div>
                    <div class="track-row"><span class="num">13</span><span class="track-name">good morning</span></div>
                    <div class="track-row"><span class="num">14</span><span class="track-name">issues</span></div>
                    <div class="track-row"><span class="num">15</span><span class="track-name">white t</span></div>
                    <div class="track-row"><span class="num">16</span><span class="track-name">16</span></div>
                </div>
                <div class="player-section" id="player">
                    <div class="slider-container">
                        <div class="slider-fill" id="progress-fill" style="width: 0%"></div>
                        <input type="range" id="progress" min="0" max="100" value="0">
                    </div>
                    <div class="controls-row">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div class="play-btn" id="play-pause">
                                <svg id="play-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                                <svg id="pause-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                            </div>
                            <a id="download-btn" href="#" download class="icon-btn">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            </a>
                        </div>
                        <div class="volume-group" id="volume-ctrl">
                            <div class="mute-btn" id="mute-toggle">
                                <svg id="vol-high" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                                <svg id="vol-mute" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                            </div>
                            <div class="slider-container" style="width: 80px;">
                                <div class="slider-fill" id="volume-fill" style="width: 50%"></div>
                                <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <audio id="audio-player" playsinline preload="auto"></audio>
    <script>
        const audio = document.getElementById('audio-player');
        const playerUI = document.getElementById('player');
        const coverImg = document.getElementById('cover-img');
        const playBtn = document.getElementById('play-pause');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progress-fill');
        const volume = document.getElementById('volume');
        const volumeFill = document.getElementById('volume-fill');
        const qualityToggle = document.getElementById('quality-toggle');
        const muteBtn = document.getElementById('mute-toggle');
        const volHighIcon = document.getElementById('vol-high');
        const volMuteIcon = document.getElementById('vol-mute');
        const downloadBtn = document.getElementById('download-btn');
        const volumeCtrl = document.getElementById('volume-ctrl');
        const tracks = document.querySelectorAll('.track-row.released');
        const MAIN_COVER = "cover.png";
        const FALLBACK_COVER = "https://i.imgur.com/5HRpgzy.png";
        let useWav = false;
        let lastVolume = 0.5;
        audio.volume = 0.5;

        const isIOS = [
            'iPad Simulator', 'iPhone Simulator', 'iPod Simulator',
            'iPad', 'iPhone', 'iPod'
        ].includes(navigator.platform) || (navigator.userAgent.includes("Mac") && "ontouchend" in document);

        if (isIOS) {
            volumeCtrl.style.display = 'none';
        }

        coverImg.onerror = () => {
            if (coverImg.src !== FALLBACK_COVER) {
                coverImg.src = FALLBACK_COVER;
            }
        };

        function updateFill(input, fill) {
            const val = (input.value - input.min) / (input.max - input.min) * 100;
            fill.style.width = val + '%';
        }

        function updateVolUI() {
            if (isIOS) return;
            const isMuted = audio.volume === 0;
            volHighIcon.style.display = isMuted ? 'none' : 'block';
            volMuteIcon.style.display = isMuted ? 'block' : 'none';
            volume.value = audio.volume;
            updateFill(volume, volumeFill);
        }

        function getAudioSource(base, isWav) {
            const folder = isWav ? 'wav' : 'mp3';
            let ext = isWav ? 'wav' : 'mp3';
            if (isWav && base === 'durag_activity') return `tracks/wav/durag_activity.WAV`;
            return `tracks/${folder}/${base}.${ext}`;
        }

        function resetToDefault() {
            audio.pause();
            audio.src = "";
            audio.currentTime = 0;
            coverImg.src = MAIN_COVER;
            playerUI.classList.remove('visible');
            tracks.forEach(t => { 
                t.querySelector('.track-name').style.color = ''; 
                t.classList.remove('active'); 
            });
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        }

        muteBtn.addEventListener('click', () => {
            if (isIOS) return;
            if (audio.volume > 0) {
                lastVolume = audio.volume;
                audio.volume = 0;
            } else {
                audio.volume = lastVolume > 0 ? lastVolume : 0.5;
            }
            updateVolUI();
        });

        qualityToggle.addEventListener('click', () => {
            useWav = !useWav;
            qualityToggle.innerText = `audio type: ${useWav ? 'wav' : 'mp3'}`;
            const activeTrack = document.querySelector('.track-row.active');
            if (activeTrack) {
                const currentTime = audio.currentTime;
                const wasPlaying = !audio.paused;
                const base = activeTrack.getAttribute('data-audio');
                const newSrc = getAudioSource(base, useWav);
                audio.src = newSrc;
                downloadBtn.href = newSrc;
                audio.currentTime = currentTime;
                if (wasPlaying) audio.play().catch(()=>{});
            }
        });

        tracks.forEach(track => {
            const nameEl = track.querySelector('.track-name');
            nameEl.addEventListener('click', () => {
                const base = track.getAttribute('data-audio');
                const src = getAudioSource(base, useWav);
                const songCover = track.getAttribute('data-cover');
                const activeColor = track.getAttribute('data-active-color');

                if (audio.src.includes(src)) {
                    resetToDefault();
                } else {
                    audio.pause();
                    audio.src = src;
                    audio.load();
                    audio.currentTime = 0;
                    downloadBtn.href = src;
                    audio.play().then(() => {
                        playerUI.classList.add('visible');
                        tracks.forEach(t => { 
                            t.querySelector('.track-name').style.color = ''; 
                            t.classList.remove('active'); 
                        });
                        track.classList.add('active');
                        nameEl.style.color = activeColor;
                        coverImg.src = songCover;
                    }).catch(() => {
                        playerUI.classList.add('visible');
                        tracks.forEach(t => { 
                            t.querySelector('.track-name').style.color = ''; 
                            t.classList.remove('active'); 
                        });
                        track.classList.add('active');
                        nameEl.style.color = activeColor;
                        coverImg.src = songCover;
                    });
                }
            });
        });

        audio.onended = () => resetToDefault();

        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            progress.value = (audio.currentTime / audio.duration) * 100;
            updateFill(progress, progressFill);
        };

        progress.addEventListener('input', () => {
            if(!audio.duration) return;
            audio.currentTime = (progress.value / 100) * audio.duration;
            updateFill(progress, progressFill);
        });

        volume.addEventListener('input', () => {
            if (isIOS) return;
            audio.volume = volume.value;
            updateVolUI();
        });

        audio.onplay = () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        };

        audio.onpause = () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        };

        playBtn.onclick = () => {
            if (audio.src) {
                if (audio.paused) audio.play().catch(()=>{}); 
                else audio.pause();
            }
        };

        window.addEventListener('keydown', (e) => {
            if (!audio.src || (e.target.tagName === 'INPUT' && e.target.type !== 'range')) return;
            switch(e.key) {
                case ' ': e.preventDefault(); playBtn.click(); break;
                case 'ArrowLeft': e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 5); break;
                case 'ArrowRight': e.preventDefault(); audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); break;
                case 'ArrowUp': e.preventDefault(); if(!isIOS) { audio.volume = Math.min(1, audio.volume + 0.05); updateVolUI(); } break;
                case 'ArrowDown': e.preventDefault(); if(!isIOS) { audio.volume = Math.max(0, audio.volume - 0.05); updateVolUI(); } break;
            }
        });

        function syncHeight() {
            const imgBox = document.getElementById('cover-img');
            const listBox = document.getElementById('list-box');
            if (window.innerWidth > 640 && imgBox && listBox) {
                listBox.style.height = imgBox.offsetHeight + 'px';
            } else if (listBox) {
                listBox.style.height = 'auto';
            }
        }

        window.addEventListener('resize', syncHeight);
        window.addEventListener('load', () => { syncHeight(); updateVolUI(); });
        new ResizeObserver(syncHeight).observe(document.getElementById('cover-img'));
    </script>
</body>
</html>
